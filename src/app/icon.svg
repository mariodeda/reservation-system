<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Gold branded background -->
  <rect width="100" height="100" rx="18" fill="#f2ca50"/>

  <!-- Badge circle -->
  <circle cx="50" cy="26" r="22" fill="#3c2f00"/>
  <!-- Checkmark -->
  <polyline points="38,26.5 46,35 64,17" fill="none" stroke="#f2ca50" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left chair back -->
  <rect x="4" y="46" width="18" height="26" rx="5" fill="#3c2f00"/>
  <!-- Left chair seat -->
  <rect x="3" y="63" width="28" height="9" rx="4" fill="#3c2f00"/>
  <!-- Left chair legs -->
  <rect x="5.5" y="72" width="5" height="14" rx="2.5" fill="#3c2f00"/>
  <rect x="15.5" y="72" width="5" height="14" rx="2.5" fill="#3c2f00"/>

  <!-- Right chair back -->
  <rect x="78" y="46" width="18" height="26" rx="5" fill="#3c2f00"/>
  <!-- Right chair seat -->
  <rect x="69" y="63" width="28" height="9" rx="4" fill="#3c2f00"/>
  <!-- Right chair legs -->
  <rect x="79.5" y="72" width="5" height="14" rx="2.5" fill="#3c2f00"/>
  <rect x="89.5" y="72" width="5" height="14" rx="2.5" fill="#3c2f00"/>

  <!-- Table top -->
  <rect x="27" y="60" width="46" height="12" rx="6" fill="#3c2f00"/>
  <!-- Table pedestal -->
  <rect x="44" y="72" width="12" height="9" rx="2" fill="#3c2f00"/>
  <!-- Table base -->
  <rect x="35" y="81" width="30" height="6" rx="3" fill="#3c2f00"/>
</svg>
